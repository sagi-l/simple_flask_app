# Test CI pipeline - learning GitHub Actions


name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: |
          pip install flake8
          flake8 main.py --max-line-length=120

  security:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - name: Scan dependencies for vulnerabilities
        run: |
          pip install safety
          safety scan -r requirements.txt || true

  build-and-scan-image:
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t simple-flask:${{ github.sha }} .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.70.0
        with:
          image-ref: simple-flask:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: '0'
